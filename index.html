<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startpage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #7c6af7;
    --accent2: #3dd9c3;
    --accent3: #f76a8a;
    --glow: rgba(124,106,247,0.15);
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 1.5rem 4rem;
    position: relative;
  }

  /* Background noise + glow */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 30%, rgba(124,106,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 70%, rgba(61,217,195,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 860px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  /* ── CLOCK / DATE ── */
  .clock-block {
    margin-top: 5vh;
    text-align: center;
  }

  .clock {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3.5rem, 12vw, 7rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    background: linear-gradient(135deg, #e8e8f0 30%, var(--accent) 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .date {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.4rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── SEARCH ── */
  .search-wrap {
    width: 100%;
    max-width: 620px;
  }

  .search-engine-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
  }

  .engine-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 0.25rem 0.7rem;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .engine-btn:hover,
  .engine-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--glow);
  }

  .search-bar {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 3.5rem 1rem 1.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }

  .search-bar input::placeholder { color: var(--muted); }

  .search-bar input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  .search-btn {
    position: absolute;
    right: 0.8rem;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.3rem;
    display: flex;
    align-items: center;
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  .search-btn:hover { opacity: 1; }

  .search-btn svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; }

  /* ── WEATHER ── */
  .weather-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    min-width: 220px;
    transition: border-color 0.2s;
  }

  .weather-card:hover { border-color: var(--border-hover); }

  .weather-icon {
    font-size: 2.2rem;
    line-height: 1;
  }

  .weather-info { display: flex; flex-direction: column; gap: 2px; }

  .weather-temp {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--text);
  }

  .weather-desc {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .weather-loc {
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* ── TOP ROW ── */
  .top-row {
    width: 100%;
    display: flex;
    justify-content: flex-end;
    align-items: flex-start;
    gap: 1rem;
    padding-top: 1.2rem;
    flex-wrap: wrap;
  }

  /* ── BOOKMARKS ── */
  .bookmarks-section {
    width: 100%;
  }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .bookmarks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 0.75rem;
  }

  .bookmark {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.9rem 0.75rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .bookmark::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .bookmark:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }

  .bookmark:hover::before { opacity: 1; }

  .bm-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .bm-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  /* Color variants for bookmark icons */
  .bm-purple { background: rgba(124,106,247,0.15); }
  .bm-teal   { background: rgba(61,217,195,0.12); }
  .bm-pink   { background: rgba(247,106,138,0.12); }
  .bm-amber  { background: rgba(239,159,39,0.12); }
  .bm-blue   { background: rgba(55,138,221,0.12); }
  .bm-green  { background: rgba(99,153,34,0.12); }

  /* ADD bookmark button */
  .bookmark.add-btn {
    border-style: dashed;
    border-color: rgba(255,255,255,0.05);
  }

  .bookmark.add-btn:hover { border-color: var(--accent); }

  .add-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(124,106,247,0.08);
    color: var(--accent);
    font-size: 1.3rem;
    font-weight: 300;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface2);
    border: 1px solid var(--border-hover);
    border-radius: 18px;
    padding: 1.5rem;
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
  }

  .modal h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.2rem;
  }

  .modal input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 0.9rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--text);
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }

  .modal input::placeholder { color: var(--muted); }
  .modal input:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 0.6rem; }

  .btn-save, .btn-cancel {
    flex: 1;
    padding: 0.65rem;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }

  .btn-save {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-save:hover { opacity: 0.85; }

  .btn-cancel {
    background: none;
    color: var(--muted);
  }

  .btn-cancel:hover { border-color: var(--border-hover); color: var(--text); }

  /* icon picker */
  .icon-picker {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .icon-opt {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    cursor: pointer;
    border: 2px solid transparent;
    background: var(--surface);
    transition: border-color 0.15s;
  }

  .icon-opt.selected { border-color: var(--accent); }

  /* Divider row */
  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 0.25rem 0;
  }

  @media (max-width: 480px) {
    .clock { font-size: clamp(3rem, 18vw, 5rem); }
    .bookmarks-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Top row: weather right-aligned -->
  <div class="top-row">
    <div class="weather-card" id="weatherCard">
      <div class="weather-icon" id="weatherIcon">⋯</div>
      <div class="weather-info">
        <div class="weather-temp" id="weatherTemp">──°C</div>
        <div class="weather-desc" id="weatherDesc">読み込み中</div>
        <div class="weather-loc" id="weatherLoc"></div>
      </div>
    </div>
  </div>

  <!-- Clock -->
  <div class="clock-block">
    <div class="clock" id="clock">00:00:00</div>
    <div class="date" id="date">──── ── ──</div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-engine-tabs" id="engineTabs">
      <button class="engine-btn active" data-engine="google" data-url="https://www.google.com/search?q=">Google</button>
      <button class="engine-btn" data-engine="ddg" data-url="https://duckduckgo.com/?q=">DuckDuckGo</button>
      <button class="engine-btn" data-engine="bing" data-url="https://www.bing.com/search?q=">Bing</button>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="検索…" autocomplete="off" autofocus />
      <button class="search-btn" id="searchBtn">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Bookmarks -->
  <div class="bookmarks-section">
    <div class="section-label">ブックマーク</div>
    <div class="bookmarks-grid" id="bookmarksGrid"></div>
  </div>

</div>

<!-- Add bookmark modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>ブックマーク追加</h3>
    <input type="text" id="bmName" placeholder="名前（例：GitHub）" maxlength="20"/>
    <input type="text" id="bmUrl" placeholder="URL（例：https://github.com）"/>
    <div class="section-label" style="margin:0">アイコン</div>
    <div class="icon-picker" id="iconPicker"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">キャンセル</button>
      <button class="btn-save" id="modalSave">保存</button>
    </div>
  </div>
</div>

<script>
// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;

  const days = ['日','月','火','水','木','金','土'];
  const y = now.getFullYear();
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const day = days[now.getDay()];
  document.getElementById('date').textContent = `${y} / ${mo} / ${d}  ${day}曜日`;
}
updateClock();
setInterval(updateClock, 1000);

// ── SEARCH ──
let currentSearchUrl = 'https://www.google.com/search?q=';

document.querySelectorAll('.engine-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.engine-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSearchUrl = btn.dataset.url;
  });
});

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  window.open(currentSearchUrl + encodeURIComponent(q), '_blank');
}

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ── WEATHER ──
const weatherIcons = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'❄️', 73:'❄️', 75:'❄️',
  80:'🌦️', 81:'🌧️', 82:'⛈️',
  95:'⛈️', 96:'⛈️', 99:'⛈️'
};
const weatherDescs = {
  0:'快晴', 1:'ほぼ晴れ', 2:'一部曇り', 3:'曇り',
  45:'霧', 48:'霧',
  51:'小雨', 53:'霧雨', 55:'霧雨',
  61:'小雨', 63:'雨', 65:'強雨',
  71:'小雪', 73:'雪', 75:'大雪',
  80:'にわか雨', 81:'雨', 82:'激雨',
  95:'雷雨', 96:'雷雨', 99:'雷雨'
};

function fetchWeather(lat, lon, city) {
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=celsius`)
    .then(r => r.json())
    .then(data => {
      const cw = data.current_weather;
      const code = cw.weathercode;
      document.getElementById('weatherIcon').textContent = weatherIcons[code] || '🌡️';
      document.getElementById('weatherTemp').textContent = Math.round(cw.temperature) + '°C';
      document.getElementById('weatherDesc').textContent = weatherDescs[code] || '──';
      document.getElementById('weatherLoc').textContent = city || '現在地';
    })
    .catch(() => {
      document.getElementById('weatherDesc').textContent = '取得失敗';
    });
}

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => {
      const {latitude: lat, longitude: lon} = pos.coords;
      // reverse geocode using open-meteo (no key needed)
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
        .then(r => r.json())
        .then(geo => {
          const city = geo.address?.city || geo.address?.town || geo.address?.village || '現在地';
          fetchWeather(lat, lon, city);
        })
        .catch(() => fetchWeather(lat, lon, ''));
    },
    () => {
      // fallback: 川越市
      fetchWeather(35.9251, 139.4858, '川越市');
    }
  );
} else {
  fetchWeather(35.9251, 139.4858, '川越市');
}

// ── BOOKMARKS ──
const ICONS = ['🔖','🌐','📧','📁','🎵','🎬','💻','🛒','📰','🔍','⭐','📝','🎮','📷','💬','🗂️'];
const COLORS = ['bm-purple','bm-teal','bm-pink','bm-amber','bm-blue','bm-green'];

const DEFAULT_BOOKMARKS = [
  { name:'GitHub',    url:'https://github.com',        icon:'💻', color:'bm-purple' },
  { name:'YouTube',   url:'https://youtube.com',        icon:'🎬', color:'bm-pink' },
  { name:'Gmail',     url:'https://mail.google.com',    icon:'📧', color:'bm-amber' },
  { name:'Reddit',    url:'https://reddit.com',         icon:'🗂️', color:'bm-teal' },
  { name:'Twitter/X', url:'https://x.com',              icon:'📝', color:'bm-blue' },
  { name:'Wikipedia', url:'https://ja.wikipedia.org',   icon:'🌐', color:'bm-green' },
];

let bookmarks = JSON.parse(localStorage.getItem('sp_bookmarks') || 'null') || [...DEFAULT_BOOKMARKS];
let selectedIcon = ICONS[0];
let selectedColor = COLORS[0];

function saveBookmarks() {
  localStorage.setItem('sp_bookmarks', JSON.stringify(bookmarks));
}

function renderBookmarks() {
  const grid = document.getElementById('bookmarksGrid');
  grid.innerHTML = '';

  bookmarks.forEach((bm, i) => {
    const a = document.createElement('a');
    a.className = 'bookmark';
    a.href = bm.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = `
      <div class="bm-icon ${bm.color}">${bm.icon}</div>
      <div class="bm-label">${bm.name}</div>
    `;
    // right-click to delete
    a.addEventListener('contextmenu', e => {
      e.preventDefault();
      if (confirm(`「${bm.name}」を削除しますか？`)) {
        bookmarks.splice(i, 1);
        saveBookmarks();
        renderBookmarks();
      }
    });
    grid.appendChild(a);
  });

  // Add button
  const addBtn = document.createElement('div');
  addBtn.className = 'bookmark add-btn';
  addBtn.innerHTML = `<div class="add-icon">+</div><div class="bm-label">追加</div>`;
  addBtn.addEventListener('click', openModal);
  grid.appendChild(addBtn);
}

// ── MODAL ──
function openModal() {
  selectedIcon = ICONS[0];
  selectedColor = COLORS[0];
  document.getElementById('bmName').value = '';
  document.getElementById('bmUrl').value = '';
  buildIconPicker();
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('bmName').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function buildIconPicker() {
  const picker = document.getElementById('iconPicker');
  picker.innerHTML = '';
  ICONS.forEach(ic => {
    const d = document.createElement('div');
    d.className = 'icon-opt' + (ic === selectedIcon ? ' selected' : '');
    d.textContent = ic;
    d.addEventListener('click', () => {
      selectedIcon = ic;
      picker.querySelectorAll('.icon-opt').forEach(o => o.classList.remove('selected'));
      d.classList.add('selected');
    });
    picker.appendChild(d);
  });
}

document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.getElementById('modalSave').addEventListener('click', () => {
  let name = document.getElementById('bmName').value.trim();
  let url = document.getElementById('bmUrl').value.trim();
  if (!name || !url) { alert('名前とURLを入力してください'); return; }
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  const color = COLORS[bookmarks.length % COLORS.length];
  bookmarks.push({ name, url, icon: selectedIcon, color });
  saveBookmarks();
  renderBookmarks();
  closeModal();
});

renderBookmarks();
</script>
</body>
</html>
